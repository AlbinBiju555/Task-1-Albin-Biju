<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccination Tracker - Register</title>
    <link rel="stylesheet" href="./static/vacc_register.css">
</head>
<body>

    <div class="register-container">

        <h2>Register</h2>

        <form id="registerForm">

            <label>Username</label>
            <input 
                type="text" 
                id="regUsername" 
                placeholder="Enter username" 
                required
            >

            <label>Password</label>
            <input 
                type="password" 
                id="regPassword" 
                placeholder="Create password" 
                required
            >

            <label>Email Id</label>
            <input 
                type="email" 
                id="regEmail" 
                placeholder="Enter Email id" 
                required
            >

            <button type="submit">Register</button>

        </form>

    </div>

    <script src="./static/vacc_register.js"></script>

</body>
</html>
