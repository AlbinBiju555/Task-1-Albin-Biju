<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Vaccination Record</title>
    <link rel="stylesheet" href="/static/vacc_upd.css">
</head>
<body>

<div class="container">

    <h1>Update Vaccination Record</h1>

    <div id="searchSection" style="text-align: center; margin-top: 20px;">
        <label style="display: block; text-align: left;">Enter Patient ID</label>
        <input 
            type="number" 
            id="searchPatientId" 
            placeholder="e.g., 1" 
            min="1" 
            style="width: 100%; margin-bottom: 20px; display: block;"
        >
        <button type="button" id="searchBtn" style="width: 100%; margin-top: 10px;">
            Find Patient Record
        </button>
    </div>

    <form id="updateForm" style="display: none;">
        <input type="hidden" id="recordId">

        <label>Patient ID</label>
        <input type="text" id="displayPatientId" readonly>

        <label>Patient Name</label>
        <input type="text" id="patientName" required>

        <label>Vaccine Name</label>
        <select id="vaccineName" required>
            <option>BCG</option>
            <option>DPT</option>
            <option>MMR</option>
            <option>Polio</option>
            <option>Hepatitis B</option>
        </select>

        <label>Vaccination Date</label>
        <input type="date" id="vaccinationDate" required>

        <label>Dose Number</label>
        <input type="number" id="doseNumber" min="1" required>

        <label>Administered By</label>
        <input type="text" id="administeredBy" required>

        <label>Remarks</label>
        <textarea id="remarks" rows="4"></textarea>

        <button type="submit">
            Update Record
        </button>
        
        <button type="button" id="backBtn" style="background: #6c757d; margin-top: 10px;">
            Back to Search
        </button>

    </form>

</div>

<script src="/static/vacc_upd.js"></script>

</body>
</html>
